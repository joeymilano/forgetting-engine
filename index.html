<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>The Forgetting Engine</title>
    <meta
      name="description"
      content="Write a memory you wish to let go. It will not be saved. Only forgotten."
    />
    <meta name="theme-color" content="#08080c" />
    <meta name="color-scheme" content="dark" />

    <!-- 中文衬线手写体:霞鹜文楷 LXGW WenKai -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css"
    />

    <!-- 英文优雅衬线:Cormorant Garamond(诗意/回忆主题) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap"
    />

    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- ===== 沉浸式背景层(由底到顶,视差 + 呼吸 + 流动) ===== -->
    <div class="bg-layer bg-stars" aria-hidden="true"></div>
    <div class="bg-layer bg-nebula" aria-hidden="true"></div>
    <div class="bg-layer bg-fog" aria-hidden="true"></div>
    <div class="bg-layer bg-aurora" aria-hidden="true"></div>
    <div class="bg-layer bg-moonlight" aria-hidden="true"></div>
    <div class="bg-layer bg-glow" aria-hidden="true"></div>
    <canvas id="ambient-canvas" class="ambient-canvas" aria-hidden="true"></canvas>
    <div class="bg-layer bg-bokeh" aria-hidden="true"></div>
    <div class="bg-layer bg-vignette" aria-hidden="true"></div>
    <div id="noise-layer" class="bg-layer bg-noise" aria-hidden="true"></div>

    <!-- 文字风化粒子层:全屏覆盖,pointer-events:none -->
    <canvas id="particle-canvas" class="particle-canvas" aria-hidden="true"></canvas>

    <!-- 自定义光标光晕(跟随鼠标,极淡暖光) -->
    <div id="cursor-glow" class="cursor-glow" aria-hidden="true"></div>

    <!-- ===== 四角细线装饰框 ===== -->
    <div class="frame" aria-hidden="true">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
    </div>

    <!-- ===== 顶部品牌标识 ===== -->
    <header class="brand" aria-hidden="true">
      <span class="brand-line"></span>
      <span class="brand-mark" data-i18n="brand">THE FORGETTING ENGINE</span>
      <span class="brand-line"></span>
    </header>

    <!-- ===== 右上控件:语言切换 + 音乐 ===== -->
    <div class="controls">
      <button
        id="lang-toggle"
        class="ctrl-btn lang-toggle"
        type="button"
        aria-label="Switch language"
        title="Switch language"
      >
        <span class="lang-opt" data-lang="en">EN</span>
        <span class="lang-sep">/</span>
        <span class="lang-opt" data-lang="zh">中</span>
      </button>

      <button
        id="music-toggle"
        class="ctrl-btn music-toggle is-off"
        type="button"
        aria-label="Play ambient music"
        title="Ambient music"
      >
        <svg class="icon-music" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M9 18V5l11-2v13"
            fill="none"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="1.4" />
          <circle cx="17" cy="16" r="3" fill="none" stroke="currentColor" stroke-width="1.4" />
        </svg>
        <span class="eq-bars" aria-hidden="true">
          <i></i><i></i><i></i><i></i>
        </span>
      </button>
    </div>

    <!-- 主舞台 -->
    <main id="app" class="app is-hidden" data-state="IDLE">
      <!-- IDLE/WRITING 视图 -->
      <section class="writing-view" data-view="writing">
        <p class="hint breathe" data-i18n="hint">
          Write a memory you wish to let go.<br />It will not be saved. Only forgotten.
        </p>
        <textarea
          id="memory-input"
          class="memory-input"
          data-i18n-placeholder="placeholder"
          placeholder="Begin here…"
          maxlength="300"
          minlength="30"
          spellcheck="false"
          autocomplete="off"
        ></textarea>
        <div class="meta-row">
          <span id="char-count" class="char-count">0 / 300</span>
        </div>
        <button id="submit-btn" class="round-btn submit-btn" type="button" disabled>
          <span class="btn-label" data-i18n="submit">Surrender to Forgetting</span>
          <span class="btn-glow" aria-hidden="true"></span>
        </button>
      </section>

      <!-- SEALING / STAGE 视图(共享中央舞台) -->
      <section class="stage-view" data-view="stage" hidden>
        <div id="stage-text" class="stage-text" data-stage="0"></div>
        <div class="stage-foot">
          <p id="loading-line" class="loading-line" hidden></p>
          <button id="stage-btn" class="round-btn stage-btn" type="button" hidden>
            <span class="btn-label"></span>
            <span class="btn-glow" aria-hidden="true"></span>
          </button>
        </div>
      </section>

      <!-- EPILOGUE 视图 -->
      <section class="epilogue-view" data-view="epilogue" hidden>
        <p id="epilogue-primary" class="epilogue-primary"></p>
        <p id="epilogue-secondary" class="epilogue-secondary"></p>
        <a href="#" id="reset-link" class="reset-link" hidden data-i18n="reset"
          >Let go of another</a
        >
      </section>
    </main>

    <!-- 右侧进度:7 道竖向刻度,走过的逐渐熄灭 -->
    <aside id="progress" class="progress" aria-hidden="true"></aside>

    <!-- 底部细铭文 -->
    <footer class="foot-mark" aria-hidden="true">
      <span data-i18n="footmark">A machine that remembers how to forget</span>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
